{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/view_user_personal_by_user.css' %}">    

</head>

<body>
<a href="javascript:history.back()" 
   style="display: inline-flex; 
          align-items: center; 
          gap: 8px; 
          padding: 10px 18px; 
          background-color: #ffffff; 
          color: #333333; 
          text-decoration: none; 
          font-family: 'Poppins', sans-serif; 
          font-size: 14px;
          margin-top: 20px;
          margin-left: 20px;
          font-weight: 600; 
          border-radius: 12px; 
          border: 1px solid #e5e7eb; 
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
          cursor: pointer; 
          transition: all 0.2s ease;
          margin-bottom: 20px;"
   onmouseover="this.style.backgroundColor='#f3f4f6'; this.style.transform='translateY(-1px)'; this.style.boxShadow='0 10px 15px -3px rgba(0, 0, 0, 0.1)';" 
   onmouseout="this.style.backgroundColor='#ffffff'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px -1px rgba(0, 0, 0, 0.05)';"
   onmousedown="this.style.transform='scale(0.98)';">
    
    <i class="fa-solid fa-arrow-left" style="font-size: 14px; color: #4f46e5;"></i> 
    👈Back
</a>
<div class="profile-box">

    <div class="profile-title">User Details</div>

    <div class="detail-row">
        <span class="label">Name:</span> {{ data.user_name }}
    </div>

    <div class="detail-row">
        <span class="label">Address:</span> {{ data.address }}
    </div>

    <div class="detail-row">
        <span class="label">District:</span> {{ data.district }}
    </div>

    <div class="detail-row">
        <span class="label">State:</span> {{ data.state }}
    </div>

    <div class="detail-row">
        <span class="label">Phone:</span> {{ data.phone_number }}
    </div>

    <a href="{% url 'update_user_personal' data.id %}" class="update-btn">Update</a>

</div>

</body>
</html>
