{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Arial;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:300px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
}
</style>
</head>

<body>
<a href="javascript:history.back()" 
   style="display: inline-flex; 
          align-items: center; 
          gap: 8px; 
          padding: 10px 18px; 
          background-color: #ffffff; 
          color: #333333; 
          text-decoration: none; 
          font-family: 'Poppins', sans-serif; 
          font-size: 14px;
          margin-top: 20px;
          margin-left: 20px;
          font-weight: 600; 
          border-radius: 12px; 
          border: 1px solid #e5e7eb; 
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
          cursor: pointer; 
          transition: all 0.2s ease;
          margin-bottom: 20px;"
   onmouseover="this.style.backgroundColor='#f3f4f6'; this.style.transform='translateY(-1px)'; this.style.boxShadow='0 10px 15px -3px rgba(0, 0, 0, 0.1)';" 
   onmouseout="this.style.backgroundColor='#ffffff'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px -1px rgba(0, 0, 0, 0.05)';"
   onmousedown="this.style.transform='scale(0.98)';">
    
    <i class="fa-solid fa-arrow-left" style="font-size: 14px; color: #4f46e5;"></i> 
    Back
</a>
<div class="login-box">
<h2 class="text-primary">Login</h2>
{% if messages %}
    {% for message in messages %}
        <p style="color:red;">{{ message }}</p>
    {% endfor %}
{% endif %}
<form action="#" method="post"  autocomplete="off">
{% csrf_token %}

<input type="text" 
       name="user_name" 
       placeholder="Username" 
       class="form-control border-primary">

<input type="password" 
       name="password" 
       placeholder="Password" 
       class="form-control border-primary">

       <input type="submit" 
       class="btn btn-primary w-100 mt-2">

</form>
<h6> din't you have account <a href="{% url 'user_personal_information_type_by_user' %}"> sign in </a> </h6>

</div>
</body>
</html>
