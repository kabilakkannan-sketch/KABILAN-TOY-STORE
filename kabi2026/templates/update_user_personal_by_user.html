{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update User Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background:#f4f6f9;
            font-family:Arial, sans-serif;
        }

        .profile-box{
            max-width:500px;
            margin:80px auto;
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 8px 25px rgba(0,0,0,0.12);
        }

        .profile-title{
            text-align:center;
            font-size:28px;
            font-weight:bold;
            color:#333;
            margin-bottom:25px;
        }

        .form-control{
            margin-bottom:15px;
            border-radius:10px;
            padding:10px;
        }

        .update-btn{
            width:100%;
            background:#0d6efd;
            color:white;
            border:none;
            padding:10px;
            border-radius:10px;
            font-weight:bold;
        }

        .update-btn:hover{
            background:#0b5ed7;
        }
    </style>
</head>

<body>
<a href="javascript:history.back()" 
   style="display: inline-flex; 
          align-items: center; 
          gap: 8px; 
          padding: 10px 18px; 
          background-color: #ffffff; 
          color: #333333; 
          text-decoration: none; 
          font-family: 'Poppins', sans-serif; 
          font-size: 14px;
          margin-top: 20px;
          margin-left: 20px;
          font-weight: 600; 
          border-radius: 12px; 
          border: 1px solid #e5e7eb; 
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
          cursor: pointer; 
          transition: all 0.2s ease;
          margin-bottom: 20px;"
   onmouseover="this.style.backgroundColor='#f3f4f6'; this.style.transform='translateY(-1px)'; this.style.boxShadow='0 10px 15px -3px rgba(0, 0, 0, 0.1)';" 
   onmouseout="this.style.backgroundColor='#ffffff'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px -1px rgba(0, 0, 0, 0.05)';"
   onmousedown="this.style.transform='scale(0.98)';">
    
    <i class="fa-solid fa-arrow-left" style="font-size: 14px; color: #4f46e5;"></i> 
    Back
</a>
<div class="profile-box">

    <div class="profile-title">Update Details</div>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="user_name" value="{{ data.user_name }}" class="form-control">

        <input type="text" name="address" value="{{ data.address }}" class="form-control">

        <input type="text" name="district" value="{{ data.district }}" class="form-control">

        <input type="text" name="state" value="{{ data.state }}" class="form-control">

        <input type="text" name="phone_number" value="{{ data.phone_number }}" class="form-control">

        <button type="submit" class="update-btn">Save Changes</button>

    </form>

</div>

</body>
</html>
