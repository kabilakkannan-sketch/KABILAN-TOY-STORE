{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Quantity - {{ data.toy_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/order_input_get_from_user.css' %}">
</head>
<body>
{% csrf_token %}
    <!-- BACK BUTTON -->
    <a href="javascript:history.back()" class="btn btn-light bg-white border mb-4 rounded-pill px-3 fw-semibold shadow-sm" style="font-size: 14px;">
        <i class="fa-solid fa-arrow-left text-primary me-1"></i> Cancel & Go Back
    </a>

    <div class="checkout-box">
        <div class="row g-0">
            <!-- இடப்பக்கம்: பொருளின் விவரங்கள் -->
            <div class="col-md-5 product-side">
                <img src="{{ data.photo.url }}" class="product-img" alt="Toy Image">
                <h4 class="fw-bold text-dark mb-2">{{ data.toy_name }}</h4>
                <p class="text-muted small px-2">{{ data.discription|truncatewords:20 }}</p>
            </div>
            
            <!-- வலப்பக்கம்: அளவு உள்ளிடும் படிவம் -->
            <div class="col-md-7 form-side">
                <span class="badge bg-indigo-subtle text-primary border border-indigo-subtle rounded-pill px-3 py-2 align-self-start mb-3" style="background-color: #e0e7ff; font-weight: 700; font-size: 11px; text-transform: uppercase;">Step 1: Select Quantity</span>
                <h2 class="fw-block text-dark mb-4" style="font-weight: 800;">Order Configuration</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary small" style="letter-spacing: 0.5px;">ENTER QUANTITY</label>
                        <input type="number" name="quantity" class="form-control form-control-custom w-100" placeholder="Minimum 1 item" required min="1" >
                        <div class="form-text text-muted mt-2 small"><i class="fa-solid fa-warehouse me-1"></i> Order Quantity: {{ data.order_qty }} pcs</div>
                    </div>

                    <div class="mb-4 border-top border-bottom py-3 d-flex justify-content-between align-items-center">
                        <span class="fw-medium text-secondary">Price Per Item:</span>
                        <span class="price-tag">₹{{ data.new_price }}</span>
                    </div>

                    <button type="submit" class="btn btn-continue w-100">
                        Continue to Summary <i class="fa-solid fa-chevron-right" style="font-size: 12px;"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
