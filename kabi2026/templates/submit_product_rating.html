<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Your Purchase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        .rating-stars {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 8px;
        }
        .rating-stars input {
            display: none;
        }
        .rating-stars label {
            font-size: 32px;
            color: #cbd5e1;
            cursor: pointer;
            transition: color 0.15s ease;
        }
        /* Hover and checked highlight mechanics using reverse flex routing */
        .rating-stars input:checked ~ label,
        .rating-stars input:hover ~ label,
        .rating-stars label:hover ~ input:checked ~ label {
            color: #ffb800;
        }
        .product-preview-card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }
    </style>
</head>
<a href="javascript:history.back()" 
   style="display: inline-flex; 
          align-items: center; 
          gap: 8px; 
          padding: 10px 18px; 
          background-color: #ffffff; 
          color: #333333; 
          text-decoration: none; 
          font-family: 'Poppins', sans-serif; 
          font-size: 14px;
          margin-top: 20px;
          margin-left: 20px;
          font-weight: 600; 
          border-radius: 12px; 
          border: 1px solid #e5e7eb; 
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
          cursor: pointer; 
          transition: all 0.2s ease;
          margin-bottom: 20px;"
   onmouseover="this.style.backgroundColor='#f3f4f6'; this.style.transform='translateY(-1px)'; this.style.boxShadow='0 10px 15px -3px rgba(0, 0, 0, 0.1)';" 
   onmouseout="this.style.backgroundColor='#ffffff'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 6px -1px rgba(0, 0, 0, 0.05)';"
   onmousedown="this.style.transform='scale(0.98)';">
    
    <i class="fa-solid fa-arrow-left" style="font-size: 14px; color: #4f46e5;"></i> 
    Back
</a>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                
                <h3 class="fw-bold mb-3">Product Review</h3>
                <p class="text-muted">Share your thoughts about this item with other families.</p>
                <hr>

                <div class="d-flex align-items-center p-3 mb-4 product-preview-card">
                    {% if order.product_photo %}
                        <img src="{{ order.product_photo.url }}" alt="Product Image" class="rounded" width="70" height="70" style="object-fit: contain; background: white; border: 1px solid #e2e8f0;">
                    {% endif %}
                    <div class="ms-3">
                        <h6 class="fw-bold mb-1 text-dark">{{ order.product_name }}</h6>
                        <small class="text-secondary">Quantity Purchased: {{ order.user_quantity }}</small>
                    </div>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-bold d-block">Your Rating</label>
                        <div class="rating-stars">
                            <input type="radio" id="star5" name="rating" value="5" required>
                            <label for="star5" class="fa-solid fa-star"></label>

                            <input type="radio" id="star4" name="rating" value="4">
                            <label for="star4" class="fa-solid fa-star"></label>

                            <input type="radio" id="star3" name="rating" value="3">
                            <label for="star3" class="fa-solid fa-star"></label>

                            <input type="radio" id="star2" name="rating" value="2">
                            <label for="star2" class="fa-solid fa-star"></label>

                            <input type="radio" id="star1" name="rating" value="1">
                            <label for="star1" class="fa-solid fa-star"></label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="review_text" class="form-label fw-bold">Write a Comment (Optional)</label>
                        <textarea class="form-control" id="review_text" name="review_text" rows="4" placeholder="What did you like or dislike about this toy?"></textarea>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{% url 'user_order_view_by_user' %}" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4 fw-bold">Submit Review</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
